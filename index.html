<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PIL Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --primary: #007AFF;
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --text: #000000;
            --ghost: #FF9500;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --card: #1C1C1E;
                --text: #FFFFFF;
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }
        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            margin-bottom: 12px;
            background: var(--card);
            color: var(--text);
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-ghost { background-color: var(--ghost); color: white; margin-top: 8px; }
        .btn:active { opacity: 0.7; }
        
        .link-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #333;
        }
        .link-item:last-child { border-bottom: none; }
        .link-info { flex: 1; overflow: hidden; margin-right: 10px; }
        .link-url { font-size: 14px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .link-actions { display: flex; gap: 8px; align-items: center; }
        
        .badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .badge-ghost { background: var(--ghost); color: white; }
        
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 20px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 2px; bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--ghost); }
        input:checked + .slider:before { transform: translateX(20px); }

        .status {
            text-align: center;
            font-size: 12px;
            margin-top: 10px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PIL Dashboard</h1>
        
        <div class="card">
            <input type="text" id="newLink" placeholder="https://exemplo.com">
            <div class="toggle-container">
                <label class="switch">
                    <input type="checkbox" id="ghostMode">
                    <span class="slider"></span>
                </label>
                <span>Modo Ghost (Fechar aba após 6s)</span>
            </div>
            <button class="btn btn-primary" onclick="addLink()">Adicionar Link</button>
        </div>

        <div class="card" id="linksContainer">
            <div style="text-align: center; color: #888;">Nenhum link salvo</div>
        </div>

        <div class="card">
            <input type="password" id="apiKey" placeholder="Sua Chave API (pil123)">
            <div class="status" id="statusMsg">Pronto</div>
        </div>
    </div>

    <script>
        let links = JSON.parse(localStorage.getItem('pil_links') || '[]');
        const WORKER_URL = 'https://pil-redirect-worker.omentalistademian.workers.dev'; // Substitua pelo seu URL do Worker

        function saveLinks() {
            localStorage.setItem('pil_links', JSON.stringify(links));
            renderLinks();
        }

        function addLink() {
            const urlInput = document.getElementById('newLink');
            const ghostInput = document.getElementById('ghostMode');
            const url = urlInput.value.trim();
            
            if (!url) return;
            
            links.push({
                id: Date.now(),
                url: url,
                isGhost: ghostInput.checked
            });
            
            urlInput.value = '';
            ghostInput.checked = false;
            saveLinks();
        }

        function deleteLink(id) {
            links = links.filter(l => l.id !== id);
            saveLinks();
        }

        async function activateLink(id) {
            const linkObj = links.find(l => l.id === id);
            const key = document.getElementById('apiKey').value || localStorage.getItem('pil_key');
            const statusMsg = document.getElementById('statusMsg');
            
            if (!key) {
                alert('Por favor, insira sua Chave API');
                return;
            }
            
            localStorage.setItem('pil_key', key);
            statusMsg.innerText = 'Enviando...';
            
            // Se for Ghost, adicionamos o prefixo para o Worker entender
            const finalUrl = linkObj.isGhost ? `GHOST|${linkObj.url}` : linkObj.url;

            try {
                const response = await fetch(`${WORKER_URL}/api/assign`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ link: finalUrl, key: key })
                });

                if (response.ok) {
                    statusMsg.innerText = 'Ativado com sucesso!';
                    statusMsg.style.color = '#4CD964';
                    setTimeout(() => { statusMsg.innerText = 'Pronto'; statusMsg.style.color = '#888'; }, 3000);
                } else {
                    statusMsg.innerText = 'Erro: Chave incorreta';
                    statusMsg.style.color = '#FF3B30';
                }
            } catch (e) {
                statusMsg.innerText = 'Erro de conexão';
                statusMsg.style.color = '#FF3B30';
            }
        }

        function renderLinks() {
            const container = document.getElementById('linksContainer');
            if (links.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #888;">Nenhum link salvo</div>';
                return;
            }
            
            container.innerHTML = links.map(l => `
                <div class="link-item">
                    <div class="link-info">
                        <div style="font-weight: 600;">${l.url.split('//')[1] || l.url} ${l.isGhost ? '<span class="badge badge-ghost">Ghost</span>' : ''}</div>
                        <div class="link-url">${l.url}</div>
                    </div>
                    <div class="link-actions">
                        <button onclick="activateLink(${l.id})" style="background: #4CD964; color: white; border: none; padding: 6px 10px; border-radius: 6px; font-size: 12px; font-weight: bold;">ATIVAR</button>
                        <button onclick="deleteLink(${l.id})" style="background: #FF3B30; color: white; border: none; padding: 6px 10px; border-radius: 6px; font-size: 12px;">X</button>
                    </div>
                </div>
            `).join('');
        }

        renderLinks();
        
        // Registrar Service Worker para PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
